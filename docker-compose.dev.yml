version: '3.8'

services:
  website-dev:
    build:
      context: ./website
      dockerfile: Dockerfile.dev
    container_name: ankorbook_website_dev
    ports:
      - "4200:4200"
    volumes:
      - ./website:/app
      - /app/node_modules
      - /app/.angular
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
