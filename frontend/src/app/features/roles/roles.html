<div class="roles-wrapper">
  <div class="page-header">
    <div>
      <h2>Roles & Permissions Matrix</h2>
      <p>System access control levels, privileges, and operational roles.</p>
    </div>
  </div>

  <div class="list-card spartan-card" *ngIf="!loading">
    <div class="table-container">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Role Key</th>
            <th>Role Description</th>
            <th>Granted Privileges</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of roles">
            <td>
              <span class="role-badge" [class]="r.role.toLowerCase()">{{ r.role }}</span>
            </td>
            <td class="bold-text">{{ r.description }}</td>
            <td>
              <div class="permissions-cell">
                <span class="perm-tag" *ngFor="let p of r.permissions">{{ p }}</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="spinner-container" *ngIf="loading">
    <div class="page-spinner"></div>
  </div>
</div>
