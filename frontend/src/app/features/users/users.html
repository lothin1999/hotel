<div class="users-wrapper">
  <div class="page-header">
    <div>
      <h2>User Management</h2>
      <p>Configure staff, manager, and administrator system accounts.</p>
    </div>
    <button class="spartan-btn-primary" (click)="openAddForm()" *ngIf="!showForm">
      + Add New User
    </button>
  </div>

  <!-- Form Card -->
  <div class="form-card spartan-card" *ngIf="showForm">
    <div class="card-header">
      <h3>{{ editingUser ? 'Edit User Account' : 'Create Staff Account' }}</h3>
      <button class="close-btn" (click)="closeForm()">Cancel</button>
    </div>

    <form (ngSubmit)="onSubmit()" class="admin-form">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" [(ngModel)]="name" name="name" placeholder="Alexander Wright" class="spartan-input" required />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="alexander@ankorbook.com" class="spartan-input" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Password {{ editingUser ? '(Leave blank to keep current)' : '' }}</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" class="spartan-input" [required]="!editingUser" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select [(ngModel)]="role" name="role" class="spartan-input" required>
            <option value="DEVELOPER">Developer (Full Access)</option>
            <option value="ADMIN">Administrator</option>
            <option value="MANAGER">Manager</option>
            <option value="STAFF">Frontdesk Staff</option>
            <option value="USER">Guest Account</option>
          </select>
        </div>
      </div>

      <button type="submit" class="spartan-btn-primary">
        {{ editingUser ? 'Save Changes' : 'Create User' }}
      </button>
    </form>
  </div>

  <!-- Users Table -->
  <div class="list-card spartan-card" *ngIf="!showForm && !loading">
    <div class="table-container">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of users">
            <td class="ref-col">#USR-{{ u.id }}</td>
            <td class="bold-text">{{ u.name || 'N/A' }}</td>
            <td>{{ u.email }}</td>
            <td>
              <span class="role-badge" [class]="u.role.toLowerCase()">{{ u.role }}</span>
            </td>
            <td>
              <div class="actions-cell">
                <button class="edit-btn" (click)="openEditForm(u)">Edit</button>
                <button class="delete-btn" (click)="deleteUser(u.id)">Delete</button>
              </div>
            </td>
          </tr>
          <tr *ngIf="users.length === 0">
            <td colspan="5" class="empty-state">No users found. Click "+ Add New User" to create one.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="spinner-container" *ngIf="loading">
    <div class="page-spinner"></div>
  </div>
</div>
