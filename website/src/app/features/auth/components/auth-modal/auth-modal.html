<div class="auth-wrap">
  <!-- Close Button -->
  <button (click)="closeModal()" class="auth-close-btn" aria-label="Close">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

  <div class="auth-header">
    <div class="auth-brand">Ankor Book</div>
    <div class="auth-sub">Estates &amp; Motorworks</div>
  </div>

  <div class="auth-columns-grid">
    <!-- Left Column: Email / Phone Form -->
    <div class="auth-col-left">

      <!-- EMAIL AUTH FIELDS -->
      <form *ngIf="authMode === 'login' || authMode === 'register'" (submit)="handleEmailAuth()" class="auth-form">
        <div *ngIf="authMode === 'register'" class="f-group animate__animated animate__fadeIn">
          <label class="f-label">Full Name</label>
          <input type="text" class="f-input" [(ngModel)]="displayName" name="displayName" placeholder="Isabelle Moreau" required>
        </div>

        <div class="f-group">
          <label class="f-label">Email Address</label>
          <input type="email" class="f-input" [(ngModel)]="email" name="email" placeholder="isabelle@moreau.com" required>
        </div>

        <div class="f-group">
          <label class="f-label">Password</label>
          <input type="password" class="f-input" [(ngModel)]="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" [disabled]="isPending" class="btn-primary w-full justify-center mt-2 cursor-pointer" style="display:flex;">
          <span *ngIf="authMode === 'login'">Enter Sanctuary</span>
          <span *ngIf="authMode === 'register'">Create Account</span>
        </button>
      </form>

      <!-- PHONE AUTH FIELDS -->
      <div *ngIf="authMode === 'phone'" class="auth-form animate__animated animate__fadeIn">
        <div *ngIf="!isVerificationSent">
          <div class="f-group">
            <label class="f-label">Phone Number</label>
            <input type="tel" class="f-input" [(ngModel)]="phoneNumber" placeholder="+1 555 123 4567">
          </div>
          <button [disabled]="isPending" (click)="sendPhoneCode()" class="btn-primary w-full justify-center cursor-pointer" style="display:flex;">
            Send Verification SMS
          </button>
        </div>

        <div *ngIf="isVerificationSent" class="animate__animated animate__fadeIn">
          <div class="f-group">
            <label class="f-label">SMS Verification Code</label>
            <input type="text" class="f-input" [(ngModel)]="verificationCode" placeholder="123456">
          </div>
          <button [disabled]="isPending" (click)="verifyPhoneCode()" class="btn-primary w-full justify-center cursor-pointer" style="display:flex;">
            Verify &amp; Sign In
          </button>
        </div>
      </div>

      <!-- Mode Toggle -->
      <div class="auth-mode-toggle">
        <a *ngIf="authMode === 'login'" (click)="setMode('register')" class="cursor-pointer">Need an account? Sign Up</a>
        <a *ngIf="authMode === 'register' || authMode === 'phone'" (click)="setMode('login')" class="cursor-pointer">Return to Login</a>
      </div>
    </div>

    <!-- Divider -->
    <div class="auth-col-divider"></div>

    <!-- Right Column: SSO Buttons -->
    <div class="auth-col-right">
      <div class="sso-title">Or Connect With</div>

      <div class="social-sso-grid">

        <!-- Google -->
        <button (click)="loginWithGoogle()" class="sso-btn cursor-pointer" aria-label="Sign in with Google">
          <svg class="sso-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>

        <!-- Apple -->
        <button (click)="loginWithApple()" class="sso-btn cursor-pointer" aria-label="Sign in with Apple">
          <svg class="sso-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.39.07 2.35.74 3.15.8 1.2-.24 2.35-.93 3.62-.84 1.54.12 2.69.72 3.46 1.83-3.18 1.88-2.43 6.03.5 7.25-.51 1.34-1.19 2.65-2.73 3.84zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          Apple
        </button>

        <!-- Facebook -->
        <button (click)="loginWithFacebook()" class="sso-btn cursor-pointer" aria-label="Sign in with Facebook">
          <svg class="sso-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.791-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z" fill="#1877F2"/>
          </svg>
          Facebook
        </button>

        <!-- Phone -->
        <button (click)="setMode('phone')" class="sso-btn cursor-pointer" aria-label="Sign in with Phone">
          <svg class="sso-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
            <line x1="12" y1="18" x2="12.01" y2="18"></line>
          </svg>
          Phone
        </button>

        <!-- Telegram -->
        <button (click)="loginWithTelegram()" class="sso-btn cursor-pointer" aria-label="Sign in with Telegram">
          <svg class="sso-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.26 13.837l-2.948-.924c-.64-.203-.652-.64.136-.954l11.498-4.43c.534-.194 1.002.131.948.692z" fill="#26A5E4"/>
          </svg>
          Telegram
        </button>

        <!-- TikTok -->
        <button (click)="loginWithTikTok()" class="sso-btn cursor-pointer" aria-label="Sign in with TikTok">
          <svg class="sso-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
            <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.27 8.27 0 004.84 1.56V6.79a4.85 4.85 0 01-1.07-.1z"/>
          </svg>
          TikTok
        </button>

      </div>
    </div>
  </div>
</div>
