<section class="gallery-section" id="gallery">
  <div class="gallery-header">
    <div>
      <div class="chip">
        <div class="chip-ornament"><span></span><span></span><span></span></div>
        <span class="chip-text">{{ galleryData?.chipText || 'The Estate' }}</span>
      </div>
      <h2 class="section-title">{{ galleryData?.title || 'Every Frame a Memory' }}</h2>
    </div>
    <p class="section-body" style="margin-top:0;max-width:300px;text-align:right">{{ galleryData?.description }}</p>
  </div>
  
  <div class="gallery-grid" *ngIf="galleryData?.items">
    <div *ngFor="let cell of galleryData!.items" class="gallery-cell">
      <img [src]="cell.image" [alt]="cell.alt">
      <div class="gallery-cell-label">{{ cell.label }}</div>
    </div>
  </div>
</section>
