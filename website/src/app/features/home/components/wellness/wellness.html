<section class="section wellness-section" id="wellness">
  <div class="wellness-decor"></div>
  <div class="section-max" style="position:relative;z-index:1;">
    <div style="text-align:center;margin-bottom:5rem;">
      <div class="chip" style="justify-content:center;">
        <div class="chip-ornament"><span></span><span></span><span></span></div>
        <span class="chip-text">{{ wellnessData?.chipText || 'Onsen Sanctuary' }}</span>
      </div>
      <h2 class="section-title" [innerHTML]="wellnessData?.title || 'Thermal <em>Transcendence</em>'"></h2>
      <p class="section-body" style="margin:1.5rem auto 0;text-align:center;">{{ wellnessData?.desc }}</p>
    </div>
    
    <!-- Spa treatments grid -->
    <div class="spa-grid">
      <div *ngFor="let item of treatments" class="spa-card">
        <div class="spa-icon">{{ item.icon }}</div>
        <div class="spa-card-title">{{ item.name }}</div>
        <div class="spa-duration">{{ item.duration }}</div>
        <div class="gold-line" style="margin:1.2rem auto;width:40px;"></div>
        <div class="spa-desc">{{ item.desc }}</div>
        <div class="spa-price">${{ item.price }}</div>
      </div>
    </div>
    
    <!-- Spa stats bar -->
    <div class="spa-stats-bar" *ngIf="wellnessData?.stats">
      <div *ngFor="let stat of wellnessData!.stats" class="spa-stat-box">
        <div class="spa-stat-num">{{ stat.num }}</div>
        <div class="spa-stat-label">{{ stat.label }}</div>
      </div>
    </div>
  </div>
</section>
