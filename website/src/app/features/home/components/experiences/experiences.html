<section class="section exp-section" id="experiences">
  <div class="section-max">
    <div class="chip">
      <div class="chip-ornament"><span></span><span></span><span></span></div>
      <span class="chip-text">{{ experiencesData?.chipText || 'Life at Ankor Book' }}</span>
    </div>
    <h2 class="section-title" style="margin-bottom:3.5rem">{{ experiencesData?.title || 'Moments Beyond the Ordinary' }}</h2>
    <div class="exp-bento" *ngIf="experiencesData?.items">
      <div *ngFor="let item of experiencesData!.items" class="exp-item">
        <img [src]="item.image" [alt]="item.alt">
        <div class="exp-overlay">
          <div class="exp-tag">{{ item.tag }}</div>
          <div class="exp-name">{{ item.name }}</div>
          <div class="exp-divider"></div>
          <div class="exp-desc">{{ item.desc }}</div>
        </div>
      </div>
    </div>
  </div>
</section>
