<div class="dp-wrap" (click)="$event.stopPropagation()">
  <!-- Trigger Display -->
  <div class="dp-trigger" [class.active]="isOpen()" (click)="toggle($event)">
    <span class="dp-value" [class.placeholder]="!displayLabel">
      {{ displayLabel || placeholder }}
    </span>
    <span class="dp-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    </span>
  </div>

  <!-- Calendar Popup -->
  <div class="dp-calendar" *ngIf="isOpen()">
    <!-- Header -->
    <div class="dp-header">
      <button class="dp-nav-btn" (click)="prevMonth()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <span class="dp-month-label">{{ headerLabel }}</span>
      <button class="dp-nav-btn" (click)="nextMonth()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <!-- Day names -->
    <div class="dp-grid dp-day-names">
      <span *ngFor="let d of DAYS" class="dp-day-name">{{ d }}</span>
    </div>

    <!-- Day cells -->
    <div class="dp-grid dp-days">
      <button
        *ngFor="let day of calendarDays"
        class="dp-day"
        [class.empty]="!day"
        [class.today]="isToday(day)"
        [class.selected]="isSelected(day)"
        [class.disabled]="isDisabled(day)"
        [disabled]="!day || isDisabled(day)"
        (click)="selectDay(day)">
        <span *ngIf="day">{{ day }}</span>
      </button>
    </div>

    <!-- Footer -->
    <div class="dp-footer">
      <span class="dp-hint">{{ MONTHS[viewMonth()] }} {{ viewYear() }}</span>
    </div>
  </div>
</div>
