services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_pass
      POSTGRES_DB: hotel_db
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_user -d hotel_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel_backend_prod
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=supersecuresecretkeyshouldbechangedinproduction12345
      - DATABASE_URL=postgresql://hotel_user:hotel_pass@postgres:5432/hotel_db
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotel_frontend_prod
    restart: always
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    depends_on:
      - backend

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: hotel_website_prod
    restart: always
    expose:
      - "4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: hotel_nginx_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - website
      - backend

volumes:
  postgres_data_prod:
